<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tests — Clinical Data Set Comparison</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .sub { color: #94a3b8; margin: 0 0 20px; font-size: 13px; }
      #summary {
        font-size: 18px;
        font-weight: 700;
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 16px;
        display: inline-block;
      }
      .pass { background: #052e16; color: #4ade80; border: 1px solid #166534; }
      .fail { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { padding: 6px 10px; border-bottom: 1px solid #1e293b; font-size: 13px; display: flex; gap: 10px; }
      .ok-mark { color: #4ade80; }
      .fail-mark { color: #f87171; }
      .msg { color: #fca5a5; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
      code { color: #a5b4fc; }
    </style>
  </head>
  <body>
    <h1>Comparison engine — unit tests</h1>
    <p class="sub">Runs entirely in your browser against <code>core.js</code>. No network, no dependencies.</p>
    <div id="summary">Running…</div>
    <ul id="list"></ul>

    <script>
      window.__renderTestResults = function (results) {
        var summary = document.getElementById("summary");
        summary.textContent =
          results.passed + " passed, " + results.failed + " failed  (" + results.total + " total)";
        summary.className = results.failed === 0 ? "pass" : "fail";
        document.title =
          (results.failed === 0 ? "PASS" : "FAIL") +
          " — " + results.passed + "/" + results.total + " tests";
        var list = document.getElementById("list");
        results.cases.forEach(function (c) {
          var li = document.createElement("li");
          var mark = document.createElement("span");
          mark.textContent = c.ok ? "✓" : "✗";
          mark.className = c.ok ? "ok-mark" : "fail-mark";
          var name = document.createElement("span");
          name.textContent = c.name;
          li.appendChild(mark);
          li.appendChild(name);
          if (!c.ok) {
            var msg = document.createElement("span");
            msg.className = "msg";
            msg.textContent = c.message;
            li.appendChild(msg);
          }
          list.appendChild(li);
        });
      };
    </script>
    <script src="core.js"></script>
    <script src="tests.js"></script>
  </body>
</html>
